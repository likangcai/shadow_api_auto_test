# ============================================
# API自动化测试框架 - 配置示例文件
# ============================================
# 使用说明：
# 1. 复制此文件为 config.yaml
# 2. 根据实际情况修改配置项
# ============================================

# ============================================
# 项目信息配置
# ============================================
project:
  name: "API自动化测试项目"           # 项目名称
  environment: "test"                # 运行环境：test(测试)/uat(预发布)/prod(生产)
  executor: ""                       # 执行人姓名（留空则显示"🤖 自动触发"）
  title: "API自动化测试报告"          # 测试报告标题（用于HTML报告和消息推送）

# ============================================
# 基础API配置
# ============================================
base_url: "https://api.example.com"  # 被测系统的基础URL
timeout: 30                          # HTTP请求超时时间（秒）
verify_ssl: false                    # 是否验证SSL证书（测试环境可设为false）
test_runner: "pytest"                # 测试引擎：pytest / unittest / mixed(混合模式)
retry_count: 3                       # 失败用例重试次数
retry_interval: 1                    # 重试间隔时间（秒）
thread_count: 2                      # 并发线程数（仅pytest支持）

# ============================================
# Mock服务配置
# ============================================
mock_server:
  host: "localhost"                  # Mock服务器地址
  port: 8899                         # Mock服务器端口

# ============================================
# 测试报告配置
# ============================================
reports:
  allure: true                       # 是否生成Allure报告
  html: false                         # 是否生成HTML报告
  
  # 报告访问地址（可选，用于消息推送中的链接）
  # 如果不配置，将自动生成：base_url + /reports/html/report.html
  report_url: "https://your-domain.com/reports/html/report.html"
  
  # pytest-xhtml插件配置（仅pytest模式有效）
  pytest_xhtml:
    css: []                          # 自定义CSS文件列表，例如：["custom.css"]
  
  # XTestRunner配置（仅unittest模式有效）
  xtestrunner:
    description: "API自动化测试报告"  # 报告描述
    language: "zh-CN"                # 报告语言：zh-CN(中文) / en(英文)
    retry: 0                         # 报告内显示的重试次数

# ============================================
# 消息推送开关配置
# ============================================
push:
  email: false                       # 是否启用邮件推送
  dingtalk: false                    # 是否启用钉钉推送
  feishu: false                      # 是否启用飞书推送
  wecom: false                       # 是否启用企业微信推送

# ============================================
# 邮件推送配置
# ============================================
email:
  smtp_server: "smtp.qq.com"         # SMTP服务器地址
  smtp_port: 587                     # SMTP端口：587(STARTTLS) / 465(SSL)
  sender: "your_email@qq.com"        # 发送方邮箱
  password: "your_auth_code"         # 邮箱授权码（非登录密码）
  recipients:                        # 接收方邮箱列表
    - "recipient1@example.com"
    - "recipient2@example.com"

# ============================================
# 钉钉机器人推送配置
# ============================================
dingtalk:
  webhook: "https://oapi.dingtalk.com/robot/send?access_token=YOUR_TOKEN"
  secret: "YOUR_SECRET"              # 加签密钥（如果启用了加签）

# ============================================
# 飞书机器人推送配置
# ============================================
feishu:
  webhook: "https://open.feishu.cn/open-apis/bot/v2/hook/YOUR_HOOK_ID"

# ============================================
# 企业微信机器人推送配置
# ============================================
wecom:
  webhook: "https://qyapi.weixin.qq.com/cgi-bin/webhook/send?key=YOUR_KEY"

# ============================================
# 配置说明
# ============================================
# 
# 1. 测试引擎选择：
#    - pytest: 适合新项目，功能强大，插件丰富
#    - unittest: Python标准库，兼容性好
#    - mixed: 同时运行两种引擎的测试用例
#
# 2. 消息推送：
#    - 需要先在对应平台创建机器人并获取webhook
#    - 钉钉机器人支持加签验证（推荐启用）
#    - 邮件推送需要配置SMTP服务器和授权码
#
# 3. 报告配置：
#    - Allure报告：功能强大，支持趋势图、分类等
#    - HTML报告：简洁明了，便于分享
#    - 建议同时开启两种报告
#
# 4. 安全建议：
#    - 不要将真实的密码、token提交到版本控制
#    - 建议使用环境变量或密钥管理服务
#    - 生产环境务必启用SSL验证（verify_ssl: true）
#
# 5. 性能优化：
#    - thread_count: 根据CPU核心数调整（建议为核心数的1-2倍）
#    - retry_count: 网络不稳定时可适当增加重试次数
#    - timeout: 根据接口响应时间合理设置
