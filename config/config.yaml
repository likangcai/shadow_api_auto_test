# API自动化测试框架配置文件
# 包含基础配置、报告设置和消息推送配置

# 基础API配置
base_url: "https://www.httpbin.org"
timeout: 30
verify_ssl: false
test_runner: "pytest"  # pytest or unittest
retry_count: 3  # 错误重试次数
retry_interval: 1  # 重试间隔（秒）
thread_count: 1  # 线程数

# 测试报告配置
reports:
  allure: true
  html: true
  # pytest-xhtml插件配置
  pytest_xhtml:
    css: []
    render_collapsed: "passed"
  # XTestRunner配置
  xtestrunner:
    title: "API Automated Test Report"
    description: "Generated by XTestRunner"
    tester: "测试人员"
    language: "zh-CN"
    retry: 0

# 消息推送开关配置
push:
  email: false
  dingtalk: false
  feishu: false
  wecom: false

# 邮件推送详细配置
email:
  smtp_server: "smtp.example.com"
  smtp_port: 465
  sender: "test@example.com"
  password: "your_password"
  recipients: ["user1@example.com", "user2@example.com"]

# 钉钉机器人推送配置
dingtalk:
  webhook: "https://oapi.dingtalk.com/robot/send?access_token=your_token"
  secret: "your_secret"

# 飞书机器人推送配置
feishu:
  webhook: "https://open.feishu.cn/open-apis/bot/v2/hook/your_token"

# 企业微信机器人推送配置
wecom:
  webhook: "https://qyapi.weixin.qq.com/cgi-bin/webhook/send?key=your_key"
