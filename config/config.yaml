# API自动化测试框架配置文件

# 项目信息配置
project:
  name: "API自动化测试项目"  # 项目名称
  environment: "uat"      # 运行环境（测试环境/预发布环境/生产环境）
  executor: "影子"         # 执行人（留空则为自动触发）

# 基础API配置
base_url: "https://www.httpbin.org"
timeout: 30
verify_ssl: false
test_runner: "pytest"  # pytest / unittest / mixed (混合模式)
retry_count: 3  # 错误重试次数
retry_interval: 1  # 重试间隔（秒）
thread_count: 2  # 线程数

# Mock服务配置
mock_server:
  host: "localhost"
  port: 8899  # Mock服务器端口，默认8899

# 测试报告配置
reports:
  allure: true
  html: true
  # 报告访问地址（可选，用于消息推送中的链接）
  # 如果不配置，将使用 base_url + /reports/html/report.html
  report_url: "./reports/html/report.html"
  # pytest-xhtml插件配置
  pytest_xhtml:
    css: []
  # XTestRunner配置
  xtestrunner:
    # 测试报告标题
    title: "API自动化测试报告"
    # 测试报告描述
    description: "测试报告模板XTestRunner"
    # 语言
    language: "zh-CN"
    # 重试次数
    retry: 0

# 消息推送开关配置
push:
  email: false
  dingtalk: true
  feishu: false
  wecom: false

# 邮件推送详细配置
email:
  smtp_server: "smtp.example.com"
  smtp_port: 465
  sender: "test@example.com"
  password: "your_password"
  recipients: ["user1@example.com", "user2@example.com"]

# 钉钉机器人推送配置
dingtalk:
  webhook: "https://oapi.dingtalk.com/robot/send?access_token=b7c2dc40d51524b0e1e9e7459b8cbe6fc7d4822d22515ba343ae0f0cf6b1fe7e"
  secret: "SECc6166eff8e8db38f714b345252e758baeb74bc4b2a9e9e1df7e13433e2f73d31"

# 飞书机器人推送配置
feishu:
  webhook: "https://open.feishu.cn/open-apis/bot/v2/hook/your_token"

# 企业微信机器人推送配置
wecom:
  webhook: "https://qyapi.weixin.qq.com/cgi-bin/webhook/send?key=your_key"
